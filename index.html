        <a href="https://wa.me/6282350241418" class="bg-white text-black px-8 py-3 rounded-full font-bold text-[11px] tracking-widest hover:bg-purple-500 hover:text-white transition transform hover:scale-105" data-i18n="nav.cta">HIRE ME</a>

        <div class="fade-in">
